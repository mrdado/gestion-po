<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: #E8EAE0; display: flex; height: 100vh; }

  /* ── PROPOSED sidebar ── */
  .sidebar-proposed {
    width: 72px;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 6px;
  }
  .logo-card {
    width: 44px; height: 44px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
  }
  .logo-card svg { color: #5BA07A; }
  .nav-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nav-icon.active { background: #2E3147; }
  .nav-icon.active svg { color: #fff; }
  .nav-icon:not(.active) { background: transparent; }
  .nav-icon:not(.active) svg { color: #8A9099; }
  .nav-icon:not(.active):hover { background: rgba(0,0,0,0.07); }
  .nav-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #F5A623; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }

  /* ── CURRENT sidebar ── */
  .sidebar-current {
    width: 72px;
    background: #2E3147;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 6px;
    margin-left: 40px;
  }
  .logo-dark {
    width: 44px; height: 44px;
    background: #3D4058;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
  }
  .nav-icon-dark {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .nav-icon-dark.active { background: #3D4058; }
  .nav-icon-dark.active svg { color: #fff; }
  .nav-icon-dark:not(.active) svg { color: #6B7280; }

  /* ── Labels ── */
  .label { text-align: center; font-size: 11px; font-weight: 600; color: #6B7280; margin-top: 12px; letter-spacing: 0.5px; }
  .wrapper { display: flex; flex-direction: column; align-items: center; }
  .page { display: flex; align-items: flex-start; gap: 0; padding: 20px; }
  svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* content area */
  .content { flex: 1; background: transparent; padding: 32px; }
  .content h2 { font-size: 22px; font-weight: 700; color: #1A1F36; margin-bottom: 8px; }
  .content p { color: #6B7280; font-size: 14px; }
  .arrow { font-size: 28px; margin: 0 20px; line-height: 1; color: #5BA07A; align-self: center; }
</style>
</head>
<body>
<div class="page">

  <!-- PROPOSED -->
  <div class="wrapper">
    <div class="label">PROPOSÉ</div>
    <div class="sidebar-proposed">
      <!-- Logo -->
      <div class="logo-card">
        <svg style="color:#5BA07A" viewBox="0 0 24 24"><path d="M12 2l0 20M2 12l20 0M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/></svg>
      </div>
      <!-- Active -->
      <div class="nav-icon active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      </div>
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      </div>
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="nav-bottom">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>
        <div class="avatar">JD</div>
      </div>
    </div>
  </div>

  <div class="arrow">→</div>

  <!-- CURRENT -->
  <div class="wrapper">
    <div class="label">ACTUEL</div>
    <div class="sidebar-current">
      <div class="logo-dark">
        <svg style="color:#9CA3AF" viewBox="0 0 24 24"><path d="M12 2l0 20M2 12l20 0M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/></svg>
      </div>
      <div class="nav-icon-dark active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="nav-icon-dark"><svg style="color:#6B7280" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="nav-icon-dark"><svg style="color:#6B7280" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg></div>
      <div class="nav-icon-dark"><svg style="color:#6B7280" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
      <div class="nav-icon-dark"><svg style="color:#6B7280" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div style="margin-top:auto; display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div class="nav-icon-dark"><svg style="color:#6B7280" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
        <div class="avatar">JD</div>
      </div>
    </div>
  </div>

  <!-- Description -->
  <div class="content" style="margin-left:32px; max-width: 320px;">
    <h2>Changements proposés</h2>
    <p style="margin-top:16px; line-height:1.8">
      ✅ Fond de la sidebar : <strong>transparent</strong> (se fond dans le fond vert-sauge)<br><br>
      ✅ Logo : <strong>carte blanche</strong> avec ombre portée + icône verte<br><br>
      ✅ Icône active : fond <strong>sombre #2E3147</strong>, icône blanche<br><br>
      ✅ Icônes inactives : grises sur fond clair, sans panneau sombre
    </p>
  </div>
</div>
</body>
</html>
